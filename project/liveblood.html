<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Hemo Bank</title>

<style>

body{
font-family:Arial;
margin:0;
background:#ffe6e6;
}

header{
background:#b30000;
color:white;
padding:20px;
text-align:center;
font-size:28px;
}

.container{
padding:30px;
text-align:center;
}

.search{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
display:inline-block;
}

select{
padding:10px;
margin:10px;
font-size:16px;
}

button{
padding:10px 20px;
background:#cc0000;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

.cards{
margin-top:30px;
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
}

.card{
background:white;
width:240px;
padding:20px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.card h3{
color:#cc0000;
margin:0;
}

.units{
color:green;
font-weight:bold;
}

</style>
</head>

<body>

<header>
🩸 Hemo Bank Blood Finder
</header>

<div class="container">

<div class="search">

<select id="blood">
<option value="">Blood Group</option>
<option>A+</option>
<option>A-</option>
<option>B+</option>
<option>B-</option>
<option>O+</option>
<option>O-</option>
<option>AB+</option>
<option>AB-</option>
</select>

<select id="state" onchange="loadDistricts()">
<option value="">Select State</option>
<option>Bihar</option>
<option>Jharkhand</option>
<option>UP</option>
</select>

<select id="district">
<option value="">Select District</option>
</select>

<button onclick="searchBlood()">Search</button>

</div>

<div class="cards" id="results"></div>

</div>

<script>

/* State -> District Data */

const districts = {

"Bihar": ["Siwan","Patna","Gaya","Muzaffarpur","Gopalganj","chapra"],

"Jharkhand": ["Ranchi","Dhanbad","Bokaro"],

"UP": ["Lucknow","Varanasi","Kanpur"]

}

/* Load districts */

function loadDistricts(){

const state = document.getElementById("state").value

const districtSelect = document.getElementById("district")

districtSelect.innerHTML="<option>Select District</option>"

if(districts[state]){

districts[state].forEach(d => {

districtSelect.innerHTML += `<option>${d}</option>`

})

}

}

/* Search Blood */

async function searchBlood(){

const blood = document.getElementById("blood").value
const district = document.getElementById("district").value.toLowerCase()

const res = await fetch("http://localhost:5000/blood")

const data = await res.json()

const results = document.getElementById("results")

results.innerHTML=""

const filtered = data.filter(item =>

(!blood || item.bloodGroup === blood) &&
(!district || item.city.toLowerCase().includes(district))

)

if(filtered.length === 0){

results.innerHTML="<h3>No blood found</h3>"
return

}

filtered.forEach(item => {

results.innerHTML += `

<div class="card">

<h3>${item.hospital}</h3>

<p><b>Blood:</b> ${item.bloodGroup}</p>

<p class="units">Units: ${item.units}</p>

<p><b>Location:</b> ${item.city || "Unknown"}</p>

</div>

`

})

}

</script>

</body>
</html>
